name: Retrain Breast Cancer Model

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlflow-ci:
    name: MLflow CI Pipeline
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          docker --version
          test -f MLProject/breast_cancer_preprocessed.csv
          echo "Workspace: $(pwd)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt
          pip install mlflow==3.12.0

      - name: Run mlflow project
        run: mlflow run MLProject --env-manager local -e train --experiment-name "breast-cancer-tuning-manual"

      - name: Get latest MLflow run_id
        id: latest_run
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_file = Path("MLProject/outputs/latest_run.json")
          if not summary_file.exists():
              raise FileNotFoundError(f"File not found: {summary_file}")

          summary = json.loads(summary_file.read_text(encoding="utf-8"))
          run_id = summary.get("run_id", "").strip()
          if not run_id:
              raise ValueError("run_id is empty in latest_run.json")

          github_output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"run_id={run_id}\n")
          print(f"Resolved run_id: {run_id}")
          PY

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlproject-outputs-${{ steps.latest_run.outputs.run_id }}
          path: MLProject/outputs/
          if-no-files-found: error
          retention-days: 14

      - name: Build Docker Model
        env:
          LOCAL_IMAGE_NAME: breast-cancer-mlflow-ci
        run: |
          test -d MLProject/outputs/model
          mlflow models build-docker -m MLProject/outputs/model -n "$LOCAL_IMAGE_NAME"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        env:
          LOCAL_IMAGE_NAME: breast-cancer-mlflow-ci
          DOCKERHUB_REPO: ${{ env.DOCKERHUB_REPO }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker tag "$LOCAL_IMAGE_NAME" "$DOCKERHUB_REPO:$SHORT_SHA"
          docker tag "$LOCAL_IMAGE_NAME" "$DOCKERHUB_REPO:latest"

      - name: Push Docker Image
        env:
          DOCKERHUB_REPO: ${{ env.DOCKERHUB_REPO }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker push "$DOCKERHUB_REPO:$SHORT_SHA"
          docker push "$DOCKERHUB_REPO:latest"
